<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pawtential — Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --ink:#ffffff;
  --muted:#cfc6ff;
  --neon:#b05bff;
  --neon-2:#8a3bff;
  --shadow:0 20px 60px rgba(16,6,28,0.7);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Urbanist;}

body{
  background: radial-gradient(circle at top, #180022, #050009 60%);
  color:var(--ink);
  padding-bottom:60px;
}

/* Header */
header{
  padding:20px;
  text-align:center;
  font-size:32px;
  font-weight:800;
  color:white;
  background:linear-gradient(180deg,rgba(12,0,20,0.8),rgba(12,0,20,0.35));
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(6px);
}

/* Container */
.container{
  max-width:900px;
  margin:30px auto;
  padding:0 16px;
}

/* Cart Item Box */
.cart-item{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  padding:18px;
  border-radius:16px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:14px;
  box-shadow:var(--shadow);
}

.cart-item img{
  width:90px;
  height:90px;
  border-radius:12px;
  object-fit:cover;
  border:1px solid rgba(255,255,255,0.1);
}

.item-info{
  flex:1;
}

.item-title{
  font-size:18px;
  font-weight:800;
}

.qty-control{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:6px;
}

.qty-btn{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  font-size:18px;
}
.qty-number{font-size:16px;font-weight:700;}

.remove{
  color:#ff9aa4;
  cursor:pointer;
  font-size:14px;
  margin-top:6px;
}

/* Billing Box */
.bill-box{
  background:rgba(255,255,255,0.06);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  margin-top:30px;
  box-shadow:var(--shadow);
}

.bill-row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  color:var(--muted);
}

.total{
  font-size:22px;
  font-weight:800;
  color:white;
  border-top:1px solid rgba(255,255,255,0.1);
  padding-top:12px;
  margin-top:10px;
}

/* Delivery Address */
.address-box{
  background:rgba(255,255,255,0.06);
  padding:20px;
  margin-top:30px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:var(--shadow);
}
.address-title{
  font-size:20px;
  font-weight:800;
  margin-bottom:6px;
}

/* Checkout Button */
.checkout{
  margin-top:30px;
  width:100%;
  padding:14px 20px;
  background:linear-gradient(90deg,var(--neon),var(--neon-2));
  border:0;
  color:#000;
  font-size:20px;
  font-weight:800;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 14px 40px rgba(176,91,255,0.25);
}
.checkout:hover{transform:translateY(-4px);}

</style>
</head>

<body>

<header>Your Cart</header>

<div class="container">

  <!-- RANDOM 6 ITEMS -->
  <div class="cart-item">
    <img src="dogg_food.jpg">
    <div class="item-info">
      <div class="item-title">Dog Food</div>
      <div class="qty-control">
        <button class="qty-btn">-</button>
        <div class="qty-number">1</div>
        <button class="qty-btn">+</button>
      </div>
      <div class="remove">Remove</div>
    </div>
    <div class="item-price">₹499</div>
  </div>

  <div class="cart-item">
    <img src="catfood.jpg">
    <div class="item-info">
      <div class="item-title">Cat Food</div>
      <div class="qty-control">
        <button class="qty-btn">-</button>
        <div class="qty-number">2</div>
        <button class="qty-btn">+</button>
      </div>
      <div class="remove">Remove</div>
    </div>
    <div class="item-price">₹399</div>
  </div>

  <div class="cart-item">
    <img src="treats.jpg">
    <div class="item-info">
      <div class="item-title">Pet Treats</div>
      <div class="qty-control">
        <button class="qty-btn">-</button>
        <div class="qty-number">1</div>
        <button class="qty-btn">+</button>
      </div>
      <div class="remove">Remove</div>
    </div>
    <div class="item-price">₹299</div>
  </div>

  <div class="cart-item">
    <img src="shampoo.png">
    <div class="item-info">
      <div class="item-title">Pet Shampoo</div>
      <div class="qty-control">
        <button class="qty-btn">-</button>
        <div class="qty-number">1</div>
        <button class="qty-btn">+</button>
      </div>
      <div class="remove">Remove</div>
    </div>
    <div class="item-price">₹249</div>
  </div>

  <div class="cart-item">
    <img src="gps track.jpeg">
    <div class="item-info">
      <div class="item-title">GPS Collar</div>
      <div class="qty-control">
        <button class="qty-btn">-</button>
        <div class="qty-number">1</div>
        <button class="qty-btn">+</button>
      </div>
      <div class="remove">Remove</div>
    </div>
    <div class="item-price">₹999</div>
  </div>

  <div class="cart-item">
    <img src="toy.png">
    <div class="item-info">
      <div class="item-title">Pet Toy</div>
      <div class="qty-control">
        <button class="qty-btn">-</button>
        <div class="qty-number">3</div>
        <button class="qty-btn">+</button>
      </div>
      <div class="remove">Remove</div>
    </div>
    <div class="item-price">₹199</div>
  </div>

  <!-- DELIVERY ADDRESS -->
  <div class="address-box">
    <div class="address-title">Delivery Address</div>
    <div>🏠 Prajwal Naik</div>
    <div>📍 Your Saved Delivery Address</div>
    <div>📞 7795135938</div>
  </div>

  <!-- BILLING -->
  <div class="bill-box">
    <div class="bill-row"><span>Subtotal</span><span>₹2644</span></div>
    <div class="bill-row"><span>Delivery</span><span>₹49</span></div>
    <div class="bill-row"><span>Tax</span><span>₹45</span></div>

    <div class="total">
      Total: ₹2738
    </div>
  </div>

  <!-- CHECKOUT -->
  <button class="checkout">Proceed to Checkout</button>

</div>

</body>
</html>
