<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pawtential — Account</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --ink:#ffffff;
  --muted:#cfc6ff;
  --neon:#b05bff;
  --neon-2:#8a3bff;
  --ring: rgba(176,91,255,0.18);
  --shadow: 0 20px 60px rgba(16,6,28,0.7);
}

/* Global */
*{margin:0;padding:0;box-sizing:border-box;font-family:Urbanist;}
body{
  background: radial-gradient(circle at top, #170021, #050009 60%);
  color:var(--ink);
  padding-bottom:60px;
}

/* Header */
header{
  padding:20px;
  text-align:center;
  font-size:32px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(180deg,rgba(12,0,20,0.8),rgba(12,0,20,0.35));
  border-bottom:1px solid rgba(255,255,255,0.06);
  backdrop-filter:blur(8px);
}

/* Profile Panel */
.profile-box{
  margin:24px auto;
  max-width:520px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:24px;
  box-shadow:var(--shadow);
  text-align:center;
}
.profile-box img{
  width:110px;height:110px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.2);
  box-shadow:0 0 20px rgba(176,91,255,0.4);
}
.profile-name{
  font-size:24px;font-weight:800;margin-top:10px;color:var(--ink);
}
.profile-email{
  margin-top:4px;color:var(--muted);font-size:14px;
}
.profile-phone{
  margin-top:4px;color:#d4c9ff;font-size:15px;
}

/* Section */
.section{
  margin:32px auto;
  max-width:1200px;
  padding:0 16px;
}
.section h2{
  font-size:26px;
  font-weight:800;
  margin-bottom:16px;
}

/* Cards grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:16px;
}
.card{
  padding:18px;
  background:rgba(255,255,255,0.06);
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 14px 40px rgba(0,0,0,0.3);
  color:white;
  backdrop-filter:blur(6px);
  cursor:pointer;
  transition:0.25s;
}
.card:hover{
  transform:translateY(-6px);
  background:linear-gradient(90deg,rgba(176,91,255,0.06),rgba(92,225,255,0.03));
}
.card i{
  font-size:32px;
  margin-bottom:10px;
  color:var(--neon);
}
.card-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:6px;
}

/* Logout */
.logout{
  display:block;
  margin:50px auto 30px;
  text-align:center;
  background:linear-gradient(90deg,var(--neon),var(--neon-2));
  padding:14px 20px;
  width:200px;
  font-weight:800;
  color:#000;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 14px 40px rgba(176,91,255,0.25);
  border:0;
}
.logout:hover{
  transform:translateY(-4px);
}

/* Responsive */
@media(max-width:600px){
  header{font-size:26px;}
  .profile-box{margin:18px 12px;}
}
</style>
</head>

<body>

<header>My Account</header>

<!-- PROFILE BOX -->
<div class="profile-box">
  <img src="https://i.imgur.com/8Q2Q2FJ.png" alt="Profile Avatar">
  <div class="profile-name">Prajwal Naik</div>
  <div class="profile-email">pawtential0@gmail.com</div>
  <div class="profile-phone">📞 7795135938</div>
</div>

<!-- ALL SECTIONS -->
<div class="section">
  <h2>Dashboard</h2>

  <div class="grid">

    <div class="card"><i class="fas fa-user"></i><div class="card-title">Profile Details</div></div>

    <div class="card"><i class="fas fa-paw"></i><div class="card-title">My Pets</div></div>

    <div class="card"><i class="fas fa-box"></i><div class="card-title">Orders & Tracking</div></div>

    <div class="card"><i class="fas fa-map-marker-alt"></i><div class="card-title">Saved Addresses</div></div>

    <div class="card"><i class="fas fa-wallet"></i><div class="card-title">Wallet & Payments</div></div>

    <div class="card"><i class="fas fa-sliders-h"></i><div class="card-title">Preferences</div></div>

    <div class="card"><i class="fas fa-microchip"></i><div class="card-title">Connected Devices</div></div>

    <div class="card"><i class="fas fa-notes-medical"></i><div class="card-title">Health Records</div></div>

    <div class="card"><i class="fas fa-headset"></i><div class="card-title">Support</div></div>

    <div class="card"><i class="fas fa-question-circle"></i><div class="card-title">FAQ & Help</div></div>

  </div>
</div>

<!-- Logout -->
<button class="logout">Logout</button>

</body>
</html>
